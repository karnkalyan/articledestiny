# Nginx configuration for articledestiny.simulcast.com.np
# Proxying requests to the Next.js Docker container running on port 3400

server {
    server_name articledestiny.com www.articledestiny.com articledestiny.simulcast.com.np;

    # Client limits
    client_max_body_size 50M; # Allow large media uploads in Quill editor

    # Next.js static asset caching
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3400;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # Cache rules
        expires 365d;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Public folder static asset caching
    location ~* \.(?:jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc|woff|woff2|ttf)$ {
        proxy_pass http://127.0.0.1:3400;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # Cache rules
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, must-revalidate";
    }

    # Proxy all other requests to the Next.js application
    location / {
        proxy_pass http://127.0.0.1:3400;
        proxy_http_version 1.1;
        
        # Support websockets
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Standard headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
